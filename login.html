<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام المعتمدين</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0B1220 0%, #1a2847 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F5F7FA;
            direction: rtl;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-container {
            background: rgba(19, 29, 49, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 0;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #7A8FAD;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #D4AF37;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(34, 48, 77, 0.5);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: #F5F7FA;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            direction: rtl;
        }

        .form-input:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(34, 48, 77, 0.7);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .form-input::placeholder {
            color: #7A8FAD;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #D4AF37 0%, #e5c158 100%);
            border: none;
            border-radius: 10px;
            color: #0B1220;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #22C55E;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #EF4444;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #7A8FAD;
            margin-top: 20px;
            line-height: 1.6;
        }

        .info-box {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #D4AF37;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
        }

        .spinner {
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top: 3px solid #D4AF37;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3B82F6;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #D4AF37;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 24px;
            }

            .logo {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="logo">🔐</div>
                <div class="login-title">لوحة الإدارة</div>
                <div class="login-subtitle">نظام المعتمدين</div>
            </div>

            <div id="message-container"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">الرمز السري</label>
                    <input 
                        type="password" 
                        id="admin-password"
                        class="form-input" 
                        placeholder="أدخل الرمز السري"
                        autocomplete="off"
                        required
                    >
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>

                <button type="submit" class="login-button" id="login-btn">
                    دخول الآن 🔓
                </button>
            </form>

            <div class="info-box">
                <strong>⚠️ تنبيه أمني:</strong>
                لا تشارك هذا الرابط مع أحد
                <br>الرمز السري يجب أن يكون معك فقط
            </div>

            <div class="footer-text">
                نظام آمن لإدارة المعتمدين
                <br>جميع البيانات محمية ومشفرة
            </div>
        </div>
    </div>

    <script>
        // رسالة الترحيب
        function showMessage(text, type) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 4000);
        }

        // معالجة تسجيل الدخول
        async function handleLogin(event) {
            event.preventDefault();

            const password = document.getElementById('admin-password').value;
            const btn = document.getElementById('login-btn');
            const loading = document.getElementById('loading');

            if (!password) {
                showMessage('❌ أدخل الرمز السري', 'error');
                return;
            }

            // عرض الـ loading
            btn.disabled = true;
            loading.style.display = 'block';

            // محاكاة التأخير (أمان)
            setTimeout(() => {
                if (password === 'admin123') {
                    // إنشاء توكن
                    const token = btoa(password + Date.now());
                    sessionStorage.setItem('adminToken', token);
                    sessionStorage.setItem('loginTime', Date.now());
                    
                    showMessage('✅ تم التحقق بنجاح، جاري الانتقال...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 800);
                } else {
                    showMessage('❌ الرمز السري خاطئ', 'error');
                    btn.disabled = false;
                    loading.style.display = 'none';
                    document.getElementById('admin-password').value = '';
                }
            }, 1000);
        }

        // منع الوصول المباشر للمتصفح
        document.addEventListener('DOMContentLoaded', () => {
            // يمكن إضافة فحوصات أمان إضافية هنا
        });
    </script>
</body>
</html>
